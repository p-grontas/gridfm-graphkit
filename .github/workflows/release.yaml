name: Build and publish Python package

on:
  push:
    tags:
      - 'v*'   # broad trigger, strict validation happens in job

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }} # Explicitly ensures the tag is checked out
          fetch-depth: 0         # Required for setuptools_scm and ancestry checks

      - name: Validate tag format and origin
        run: |
          TAG="${GITHUB_REF_NAME}"

          echo "Tag detected: $TAG"

          # Enforce strict format: vX.Y.Z or vX.Y.ZrcN where X,Y,Z,N are integers
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(rc[0-9]+)?$ ]]; then
            echo "Invalid tag format. Expected vX.Y.Z or vX.Y.ZrcN"
            exit 1
          fi

          # Fetch main branch history just to validate ancestry
          git fetch origin main

          # Check if tag commit is contained in main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag is not on main branch"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install build + docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools_scm
          pip install mkdocs-material mike mkdocstrings[python] \
                     mkdocs-git-revision-date-localized-plugin timm

      - name: Build package
        run: python -m build --sdist --wheel

      - name: Check artifacts
        run: ls -l dist

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine check dist/*
          python -m twine upload dist/* --non-interactive
